<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/all.min.css">
    <link rel="stylesheet" href="/css/login.css">
    <title>Document</title>
</head>
<body>
    
    <div class="login_Page">
        <div class="logo">

            <div class="content">

                <img src="/image/Screenshot 2026-07-09 053851.png" alt="">

                <div class="text">
                    <h2>Collection <span>Manager</span></h2>
                    <p>manage your customers and collections in an easy and efficient way</p>
                </div>
                
            </div>
        </div>








 
        <div class="login active">
            <div class="container">

                <div class="header">

                  <i class="fa-solid fa-lock"></i>

                   <div class="text">
                    <h2>Welcome Back</h2>
                    <p class="msg">Please sign in to Your Account</p>
                   </div>

                </div>

                    <form action="">
                        <input id="username" class="input" type="text" placeholder="اسم المستخدم">
                        <input id="password" class="input" type="password" placeholder="كلمة المرور">

                        <div class="remermber_forgot">
                        <div class="remermber">
                        <input id="checkbox" type="checkbox" >
                        <span>تذكرني</span>
                        </div>
                        <div class="forgot">
                            <a href="">نسيت كلمة المرور؟</a>
                        </div>
                    </div>
                        <button type="button" id="send"><i class="fa-solid fa-arrow-right-to-bracket"></i> تسجيل الدخول</button>
                    </form>
                    <button type="button" id="trans_signup"><i class="fa-solid fa-user-plus"></i> سجل حساب</button>
                    <p></p>
                    <div class="google"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" width="20"height="20">سجل عن طريق جوجل </div>
            </div>
        </div>
 





        <div class="signup">
            <div class="container">
            <i id="logo_icon" class="fa-solid fa-user-plus"></i>
            <div class="header">
                   <div class="text">
                    <h2>Create <span>Account</span></h2>
                    <p>Please sign up to get started</p>
                   </div>

                </div>

                <div class="inputs">
                    <input id="signup_fullname" type="text" placeholder="الاسم كامل">
                    <input id="signup_userName" type="text" placeholder="اسم المستخدم">
                    <input id="signup_email" type="email" placeholder="حساب الاميل">
                    <input id="signup_password" type="password" placeholder="كلمة المرور">
                    <input id="signup_conf_password" type="password" placeholder="تاكيد كلمة المرور">
                </div>
                <div class="checkbox"> <input type="checkbox">انا اوافق</div>
                <button type="button" id="signup_btn"><i class="fa-solid fa-user-plus"></i>انشاء حساب</button>

                <p class="signin">هل لديك حساب؟ <span id="signin_btn">سجل دخول</span></p>
                
            </div>
        </div>
    </div>
    <script src="login.js"></script>
</body>
</html>
